[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ryotenkai-providers"
version = "1.0.0"
description = "Cloud provider clients (RunPod, single_node) + inference engines (vLLM)"
authors = [{ name = "Golikov Daniil", email = "daniil.golikoff@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "ryotenkai-shared",
    "runpod>=1.7.0,<2.0.0",
    "paramiko>=3.5.0",
    "cryptography>=41.0.0",
    "httpx>=0.27.0",
]

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
