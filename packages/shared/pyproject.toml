[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ryotenkai-shared"
version = "1.0.0"
description = "Shared utilities, config schemas, constants, and infrastructure protocols"
authors = [{ name = "Golikov Daniil", email = "daniil.golikoff@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.0,<3.0.0",
    "pydantic-settings>=2.6.0,<3.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "loguru>=0.7.0,<1.0.0",
    "rich>=14.2.0,<15.0.0",
    "colorlog>=6.9.0",
    "requests>=2.32.0,<3.0.0",
    "httpx>=0.27.0",
    "mlflow>=3.11.1,<4.0.0",
    "websockets>=13.0.0,<14.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
