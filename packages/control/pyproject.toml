[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ryotenkai-control"
version = "1.0.0"
description = "Mac-side control plane: pipeline orchestrator + FastAPI + CLI + reporting + evaluation"
authors = [{ name = "Golikov Daniil", email = "daniil.golikoff@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "ryotenkai-shared",
    "ryotenkai-community",
    "ryotenkai-providers",
    "fastapi>=0.115.0,<1.0.0",
    "uvicorn[standard]>=0.32.0,<1.0.0",
    "websockets>=13.0.0,<14.0.0",
    "typer>=0.12.0",
    "prefect>=3.1.0,<4.0.0",
    "dvc>=3.58.0,<4.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
ryotenkai = "ryotenkai_control.cli.app:app"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
