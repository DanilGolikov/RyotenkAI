[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ryotenkai-pod"
version = "1.0.0"
description = "Pod-side runner (HTTP server) + trainer (subprocess) — deployed together as one image"
authors = [{ name = "Golikov Daniil", email = "daniil.golikoff@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "ryotenkai-shared",
    "ryotenkai-community",
    "fastapi>=0.115.0,<1.0.0",
    "uvicorn[standard]>=0.32.0,<1.0.0",
    "websockets>=13.0.0,<14.0.0",
    "httpx>=0.27.0",
    "torch>=2.5.0",
    "transformers>=4.46.0,<5.0.0",
    "peft>=0.13.0,<1.0.0",
    "accelerate>=1.0.0",
    "bitsandbytes>=0.42.0; sys_platform != 'darwin'",
    "sentencepiece>=0.2.0",
    "datasets>=4.4.1",
    "trl>=0.12.0",
    "huggingface-hub>=0.26.0,<1.0.0",
    "pynvml>=11.5.0",
    "tensorboard>=2.18.0",
    "scipy>=1.13.0",
    "scikit-learn>=1.5.0",
    "pandas>=2.2.0",
    "protobuf>=5.28.0",
    "dill>=0.4.0",
]

[project.scripts]
ryotenkai-trainer-run = "ryotenkai_pod.trainer.run_training:main"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
