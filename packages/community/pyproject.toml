[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ryotenkai-community"
version = "1.0.0"
description = "Plugin loader / catalog / manifest / sync framework"
authors = [{ name = "Golikov Daniil", email = "daniil.golikoff@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "ryotenkai-shared",
]

[tool.setuptools.packages.find]
where = ["src"]
namespaces = false
