# Allowlist for tests/_lint/test_exception_root.py
#
# Every entry is a fully-qualified ``<dotted.module>.ClassName`` whose base
# class resolves to a generic Python exception (Exception, RuntimeError,
# LookupError, ValueError, TimeoutError, ...) instead of the unified
# ``RyotenkAIError`` root.
#
# Phase A1 (sharded-stargazing-wigderson, 2026-05-14) introduces the
# unified root and the sentinel. Existing classes that pre-date this
# phase are allowlisted here with ``phase-A1-pending-migration`` and
# the migration phase that will retire them.
#
# Removing an entry is fine; adding one requires a code-owner review.
# When migrating a class, delete its row from this list as part of the
# same PR.
allow:
  # ----- pod runtime (Phase B/F) ------------------------------------
  - path: ryotenkai_pod.runner.supervisor.SupervisorError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (pod runtime rewires)"
  - path: ryotenkai_pod.runner.event_bus.BufferTruncatedError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (event bus)"
  - path: ryotenkai_pod.runner.plugin_unpacker.PluginUnpackError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (plugin loader)"
  - path: ryotenkai_pod.runner.state.InvalidTransitionError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (FSM)"
  - path: ryotenkai_pod.trainer.memory_manager.OOMRecoverableError
    reason: "phase-A1-pending-migration: will be migrated in Phase D (trainer exit payload)"
  - path: ryotenkai_pod.trainer._concurrent_helpers.TimeoutExceededError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (concurrency helpers)"
  - path: ryotenkai_pod.runner.runtime.provider_registry.BootstrapConfigError
    reason: "phase-A1-pending-migration: will be migrated in Phase F (provider bootstrap)"
  - path: ryotenkai_pod.runner.api.errors.APIError
    reason: "phase-A1-pending-migration: replaced by RyotenkAIError in Phase B"
  - path: ryotenkai_pod.trainer.managers.data_buffer.fault_simulator.SimulatedFaultError
    reason: "phase-A1-pending-migration: test-only fault simulator; will be migrated in Phase D"

  # ----- providers (Phase E) ----------------------------------------
  - path: ryotenkai_providers.registry.ProviderRegistryError
    reason: "phase-A1-pending-migration: will be migrated in Phase E (provider translation)"

  # ----- AppError + Result legacy: retired in Phase A2 finale -------
  # (entries removed together with the deleted result.py module)

