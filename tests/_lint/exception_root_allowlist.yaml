    reason: "phase-A1-pending-migration: APIException subclass; replaced by errors.TransportError in Phase B"
  - path: ryotenkai_shared.utils.clients.job_client.JobClientError
    reason: "phase-A1-pending-migration: will be migrated in Phase E (job client translation)"
  - path: ryotenkai_shared.utils.clients.job_client.JobNotFoundError
    reason: "phase-A1-pending-migration: will be migrated in Phase E (job client translation)"
