# Snapshot of all ErrorCode members that have ever existed.
# NEVER remove entries. CI sentinel test_error_code_never_shrinks.py
# blocks PRs that delete ErrorCode members.
#
# When adding a new ErrorCode: add it here too in the same PR.
#
# Per RFC 9457 + project policy, error codes are stable identifiers
# that clients (frontend, CLI, scripts) pin on. Removing a code
# silently breaks them. To deprecate: keep the enum member, mark
# it deprecated in the docstring, stop emitting it; never delete.
