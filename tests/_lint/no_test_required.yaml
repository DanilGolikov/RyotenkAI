# Allowlist for `tests/_lint/test_every_module_has_tests.py`.
#
# Production modules that legitimately do NOT need a dedicated test file.
# Every entry must include a `reason`. The sentinel checks each module
# under `packages/*/src/**/*.py` (skipping `__init__.py`) for at least
# one referencing test file; modules listed here are excused.
#
# Format:
#   - path: <relative path from repo root>
#     reason: <one-sentence justification>

allow:
  # Pure type/constant modules — no behavior to test
  - path: packages/shared/src/ryotenkai_shared/constants.py
    reason: "Constant module — only declarative names; behavior verified by consumers."
  - path: packages/control/src/ryotenkai_control/pipeline/stages/managers/deployment_constants.py
    reason: "Constant module — only deployment timeout/path/truncation numbers; behavior verified by deployment manager tests."
  # Aggregator modules that only re-export — covered by package-level imports
  - path: packages/shared/src/ryotenkai_shared/config/__init__.py
    reason: "Pure re-export aggregator; consumers test the actual config types."
  # CLI entrypoint scripts — exercised by integration/e2e
  - path: packages/control/src/ryotenkai_control/main.py
    reason: "CLI entrypoint; exercised by e2e CLI tests via ryotenkai console script."
  - path: packages/pod/src/ryotenkai_pod/runner/main.py
    reason: "Server entrypoint; exercised by stack-sidecar integration tests."

