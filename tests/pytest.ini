[pytest]
# Greenfield pytest configuration — anchors at tests/.
# Required so ``pytest -c tests/pytest.ini tests/`` resolves rootpath
# to the worktree root and applies the same import-mode used by the
# previous batches.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --import-mode=importlib

asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore:co_lnotab is deprecated, use co_lines instead\.:DeprecationWarning:datasets\.utils\._dill

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_gpu: marks tests that require GPU
    requires_internet: marks tests that require internet connection
    requires_external_data: marks tests that require external data repository
    ssh: marks tests that require SSH connection to RunPod
    gpu: marks tests that require GPU hardware
    requires_ssh_pc: marks tests that require SSH PC connection
    contract: marks tests as L3 contract/compliance tests
    compliance: marks Protocol compliance tests (Phase 1 fake/real parametrization)
    exercises_protocol(name): records which Protocol a compliance test exercises
    uses_fake(name): records which canonical Fake a compliance test exercises
    live: gates the real-impl variant of compliance tests (only runs with RYOTENKAI_LIVE=1)
    stack: marks L6 smoke tests that boot the hermetic sidecar stack (fake-runpod, fake-mlflow, fake-vllm, fake-hf-hub)
    component: marks L2 component tests — one production class with all collaborators replaced by canonical fakes
    property: marks L7 Hypothesis-driven property tests
    golden: marks L8 snapshot / golden tests (syrupy / pytest-regressions)
    chaos: marks L9 chaos / fault-injection scenarios (ChaosScenario framework)
    load: marks L10 load / scale tests (RunLoader, p99 latency)
    visual: marks L11 visual regression tests (Storybook + lost-pixel)
    replay: marks L12 replay-regression tests (Playwright traces)
