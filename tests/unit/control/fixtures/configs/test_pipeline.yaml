# Test Pipeline Configuration
# Minimal config for testing without real GPU/RunPod.
# Schema updated 2026-05-12 by xfail-debt audit to match post-Phase-B
# PipelineConfig (typed `source` discriminator, typed `training.adapter`,
# typed `inference.engine` discriminator).

model:
  name: test-model/test-llm
  torch_dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  flash_attention: false

datasets:
  default:
    source:
      kind: local
      local_paths:
        train: tests/fixtures/datasets/test_chat.jsonl
        eval: null
    max_samples: null

training:
  provider: single_node
  adapter:
    kind: qlora
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    bias: none
    target_modules: "all-linear"
    use_dora: false
    use_rslora: false
    init_lora_weights: gaussian
    bnb_4bit_quant_type: nf4
    bnb_4bit_compute_dtype: bfloat16
    bnb_4bit_use_double_quant: true
  strategies:
    - strategy_type: sft
      dataset: default
      hyperparams:
        epochs: 1
        learning_rate: 2.0e-4
  hyperparams:
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 2
    learning_rate: 2.0e-4
    warmup_ratio: 0.05
    epochs: 1
    lr_scheduler_type: cosine
    fp16: false
    bf16: true
    gradient_checkpointing: true
    logging_steps: 1
    save_steps: 10
    max_length: 256
    packing: false

providers:
  single_node:
    connect:
      ssh:
        alias: test
    cleanup:
      cleanup_workspace: true
      keep_on_error: false
      on_interrupt: true
    training:
      workspace_path: /tmp/test_workspace
      mock_mode: true
    inference:
      serve:
        workspace: /tmp/test_inference
        host: 127.0.0.1
        port: 8000

inference:
  enabled: false
  provider: single_node
  engine:
    kind: vllm
  common:
    model_source: auto

integrations:
  mlflow:
    tracking_uri: http://localhost:5002
    experiment_name: test
  huggingface:
    repo_id: test/test-model
    private: true
