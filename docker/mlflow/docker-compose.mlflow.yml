name: ryotenkai

services:
  # PostgreSQL - stores MLflow metadata (runs, params, metrics)
  postgres:
    image: postgres:16.11-alpine
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.mlflow}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.mlflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlflow_network

  # MinIO - S3-compatible storage for artifacts (models, plots, logs)
  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env.mlflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env.mlflow}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlflow_network

  # MinIO Init - creates bucket for MLflow
  minio-init:
    image: minio/mc:latest
    container_name: mlflow_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo '🔧 Configuring MinIO...';
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb minio/${MINIO_BUCKET} --ignore-existing;
      mc anonymous set download minio/${MINIO_BUCKET};
      echo 'MinIO bucket created: ${MINIO_BUCKET}';
      "
    networks:
      - mlflow_network

  # MLflow Server - tracking server with artifact proxy
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: mlflow-server:latest
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # S3/MinIO credentials for artifact storage
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_IGNORE_TLS: "true"
      BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ARTIFACTS_DESTINATION: s3://${MINIO_BUCKET}
      MLFLOW_APP_NAME: ${MLFLOW_APP_NAME:-}
      MLFLOW_HOST_PORT: ${MLFLOW_PORT:-5002}
      MLFLOW_SERVER_ALLOWED_HOSTS: ${MLFLOW_SERVER_ALLOWED_HOSTS:-}
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: ${MLFLOW_SERVER_CORS_ALLOWED_ORIGINS:-}
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY:-}
    ports:
      - "${MLFLOW_PORT:-5002}:5000"
    healthcheck:
      # NOTE: base MLflow image doesn't include curl. Use Python stdlib instead.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mlflow_network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  mlflow_network:
    name: mlflow_network
    driver: bridge
