name: lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install deps
        run: |
          uv venv .venv
          uv sync --all-extras

      - name: make lint
        run: make lint

      - name: make lint-no-mocks-in-new-tests
        run: make lint-no-mocks-in-new-tests
