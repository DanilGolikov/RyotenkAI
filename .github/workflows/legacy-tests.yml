name: legacy-tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Legacy lane: non-blocking warning (continue-on-error). Бюджет <10 мин.
jobs:
  legacy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install deps
        run: |
          uv venv .venv
          uv sync --all-extras

      - name: make test (legacy)
        id: legacy
        continue-on-error: true
        run: make test

      - name: Annotate failure (non-blocking)
        if: steps.legacy.outcome == 'failure'
        run: |
          echo "::warning::Legacy test lane failed. This does not block merge per Phase 0 plan." \
            "Investigate before greenlighting if symptoms suggest a real regression."
