name: e2e

on:
  schedule:
    # Phase 6 — nightly Playwright e2e against the hermetic stack.
    - cron: "30 3 * * *"
  workflow_dispatch: {}

# Boot the hermetic stack via `make start-stack`, run Playwright,
# upload traces on failure. Budget: ~30 min.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Python deps
        run: |
          uv venv .venv
          uv sync --all-extras

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install FE deps
        run: cd web && npm ci

      - name: Install Playwright (chromium only)
        run: cd web && npx playwright install --with-deps chromium

      - name: Start hermetic stack
        run: make start-stack

      - name: Run Playwright e2e
        env:
          RYOTENKAI_E2E_USE_STACK: '1'
        run: cd web && npm run test:e2e

      - name: Stop hermetic stack
        if: always()
        run: make stop-stack

      - name: Upload playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
