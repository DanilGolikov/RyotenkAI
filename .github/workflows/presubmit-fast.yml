name: presubmit-fast

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# L1 only — должен укладываться в 3 мин на cold cache.
jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install deps
        run: |
          uv venv .venv
          uv sync --all-extras

      - name: pytest tests/unit/
        run: .venv/bin/pytest -c tests/pytest.ini tests/unit/
