name: release-gate

on:
  push:
    tags:
      - 'v*'

# Phase-6 release gate: every test lane runs against a tagged release.
# Budget: ~90 min. If any step fails the release is blocked except for
# the visual lane which stays non-blocking per Decision 7.
jobs:
  full-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Python deps
        run: |
          uv venv .venv
          uv sync --all-extras

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install FE deps
        run: cd web && npm ci

      - name: Install Playwright
        run: cd web && npx playwright install --with-deps chromium

      - name: make test-all (legacy + greenfield lanes)
        run: make test-all

      - name: make verify-api-sync
        run: make verify-api-sync

      - name: Build Storybook
        run: cd web && npm run build-storybook

      - name: Visual regression (non-blocking warning)
        run: cd web && npm run visual-test
        continue-on-error: true

      - name: Playwright e2e
        run: cd web && npm run test:e2e

      - name: Lighthouse CI
        run: cd web && npm run lighthouse

      - name: Replay corpus (heavyweight)
        env:
          RYOTENKAI_REPLAY_FULL: '1'
        run: .venv/bin/python -m pytest -c tests/pytest.ini tests/replay/ -v

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts
          path: |
            web/storybook-static/
            web/.lost-pixel/
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
