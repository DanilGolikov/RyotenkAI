model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: bfloat16
  trust_remote_code: false

training:
  type: "lora"

  lora:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    bias: none
    target_modules: "all-linear"
    use_dora: false
    use_rslora: false
    init_lora_weights: gaussian

  hyperparams:
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 1
    learning_rate: 1.0e-4
    warmup_ratio: 0.03
    epochs: 1
    weight_decay: 0.0
    lr_scheduler_type: cosine
    bf16: true
    fp16: false
    gradient_checkpointing: true
    logging_steps: 5
    save_steps: 50
    max_length: 512
    packing: true

  strategies:
    - strategy_type: "sft"
      dataset: "default"

datasets:
  default:
    source_type: local
    source_local:
      local_paths:
        train: "./datasets/train.jsonl"

providers: {}
