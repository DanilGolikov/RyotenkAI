[plugin]
id = "helixql_gold_syntax_backend"
kind = "validation"
name = "HelixQL Gold Syntax Backend (SFT)"
version = "1.0.0"
category = "sft"
stability = "stable"
description = "Validates gold HelixQL via Helix CLI compile (syntax + analysis, no cargo)."

[plugin.entry_point]
module = "plugin"
class = "HelixQLGoldSyntaxBackendValidator"

[params_schema.timeout_seconds]
type = "integer"
min = 1
default = 30
description = "Helix CLI compile timeout per sample, seconds."

[params_schema.max_error_examples]
type = "integer"
min = -1
default = 10
description = "Cap on sample-level error examples kept per error type. -1 = keep all."

[thresholds_schema.min_pass_rate]
type = "number"
min = 0.0
max = 1.0
default = 1.0
description = "Lower bound on the share of samples that must compile cleanly."

[suggested_params]
timeout_seconds = 30
max_error_examples = 10

[suggested_thresholds]
min_pass_rate = 1.0

# Demo wiring of the v3.1 plugin env contract — see
# `src/community/manifest.py::RequiredEnvSpec` and `BasePlugin.REQUIRED_ENV`
# in `src/utils/plugin_base.py`. The Configure modal renders a section
# of inputs for these and persists to the project's env.json.
[[required_env]]
name = "HELIX_CLI_PATH"
description = "Path to the `helix` CLI used to compile gold queries."
optional = true
secret = false
managed_by = ""
