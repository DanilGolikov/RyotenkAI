schema_version = 5

[plugin]
id = "helixql_preference_semantics"
kind = "validation"
name = "HelixQL Preference Semantics (DPO)"
version = "1.0.0"
category = "dpo"
stability = "stable"
description = "Checks that chosen/rejected pairs are domain-consistent and chosen is objectively better than rejected."

author = "Daniil Golikoff <daniil.golikoff@gmail.com>"

[plugin.entry_point]
module = "plugin"
class = "HelixQLPreferenceSemanticsValidator"

[params_schema.timeout_seconds]
type = "integer"
min = 1
default = 30
description = "Helix CLI compile timeout per sample, seconds."

[params_schema.max_error_examples]
type = "integer"
min = -1
default = 10
description = "Cap on sample-level error examples kept per error type. -1 = keep all."

[thresholds_schema.min_valid_ratio]
type = "number"
min = 0.0
max = 1.0
default = 1.0
description = "Lower bound on the share of preference pairs that must validate."

[suggested_params]
timeout_seconds = 30
max_error_examples = 10

[suggested_thresholds]
min_valid_ratio = 1.0

[[lib_requirements]]
name = "helixql"
version = ">=1.0.0,<2.0.0"
