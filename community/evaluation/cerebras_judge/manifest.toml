[plugin]
id = "cerebras_judge"
kind = "evaluation"
name = "Cerebras Judge"
version = "1.0.0"
category = "llm_judge"
stability = "stable"
description = "LLM-as-judge: uses Cerebras to score model answers on a 1–5 scale against expected answers. Normalizes scores to [0, 1]."

[plugin.entry_point]
module = "plugin"
class = "CerebrasJudgePlugin"

# Single source of truth for the env vars this plugin needs.
# ``secret=true, optional=false`` is what makes the loader populate the
# ``_required_secrets`` ClassVar — the registry then auto-injects the
# resolved value into ``instance._secrets`` at plugin construction time
# (see src/community/registry_base.py:_inject_secrets).
[[required_env]]
name = "EVAL_CEREBRAS_API_KEY"
description = "API key for the Cerebras Inference Cloud (https://cloud.cerebras.ai). Used by this judge to score model answers."
optional = false
secret = true
managed_by = ""
