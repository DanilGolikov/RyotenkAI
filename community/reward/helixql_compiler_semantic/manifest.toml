schema_version = 5

[plugin]
id = "helixql_compiler_semantic"
kind = "reward"
name = "HelixQL Compiler Semantic"
version = "1.0.0"
category = "semantic"
stability = "stable"
description = "Domain reward for HelixQL GRPO/SAPO: compiles generated queries against the schema and scores semantic similarity to the reference answer."
supported_strategies = ["grpo", "sapo"]

author = "Daniil Golikoff <daniil.golikoff@gmail.com>"

[plugin.entry_point]
module = "plugin"
class = "HelixQLCompilerSemanticRewardPlugin"

[params_schema.validation_backend]
type = "enum"
options = ["compile", "semantic_only"]
default = "compile"

[params_schema.timeout_seconds]
type = "integer"
min = 1
max = 120
default = 10

[suggested_params]
validation_backend = "compile"
timeout_seconds = 10

# Optional path to the `helix` CLI. The plugin's setup script
# auto-installs it under /usr/local/bin (or ~/.local/bin) inside
# Docker, but operators running on bare metal may want to point at a
# pre-built binary. Surfaced as a non-secret env so the Configure
# modal lets them override without touching env.json by hand.
[[required_env]]
name = "HELIX_CLI_PATH"
description = "Path to the `helix` CLI binary used by the compile-validation backend. Leave empty to use whatever is on PATH."
optional = true
secret = false
managed_by = ""

[[lib_requirements]]
name = "helixql"
version = ">=1.0.0,<2.0.0"
