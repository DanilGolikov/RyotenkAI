# Preset: single-node smoke run
# Minimum viable pipeline config for a local GPU smoke test on a small
# instruction-tuned model. Use this as the starting point for local
# debugging — not for full training runs.
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: bfloat16
  trust_remote_code: true

providers:
  single_node:
    type: single_node
    connect: {}
    cleanup: {}
    training:
      environment: default
    inference:
      engine: transformers

datasets:
  default:
    name: default
    source_type: local
    source_local:
      format: jsonl
      local_paths:
        train: ./datasets/train.jsonl

training:
  provider: single_node
  type: qlora
  hyperparams:
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-4
    warmup_ratio: 0.03
    epochs: 1
  strategies:
    - strategy_type: sft
      dataset: default
