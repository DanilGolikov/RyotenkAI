# Preset: single-node smoke run
# Minimum viable pipeline config for a local GPU smoke test on a small
# instruction-tuned model. Adjust dataset paths to your own files.
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: bfloat16
  trust_remote_code: false

training:
  provider: single_node
  type: "qlora"

  qlora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: none
    target_modules: "all-linear"
    use_dora: false
    use_rslora: false
    init_lora_weights: gaussian

  hyperparams:
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-4
    warmup_ratio: 0.03
    epochs: 1
    logging_steps: 10
    save_steps: 100
    bf16: true
    fp16: false
    gradient_checkpointing: true

  strategies:
    - strategy_type: "sft"
      dataset: "default"
      hyperparams:
        max_length: 1024
        packing: false

datasets:
  default:
    source_type: local
    source_local:
      local_paths:
        train: "./datasets/train.jsonl"

providers:
  single_node:
    connect:
      ssh:
        alias: localhost
    cleanup:
      cleanup_workspace: true
      keep_on_error: true
      on_interrupt: true
    training:
      workspace_path: "/tmp/ryotenkai/workspace"
      docker_image: "ryotenkai/ryotenkai-training-runtime:v1.0.1-cu124-py312"
    inference:
      serve:
        host: "127.0.0.1"
        port: 8000
