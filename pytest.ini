[pytest]
# Pytest configuration

# Test discovery
# ``community`` is scanned so per-plugin test_*.py files run alongside the code.
testpaths = src community
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options.
# ``--import-mode=importlib`` lets pytest collect identically-named modules
# across community/<kind>/<plugin>/ directories without requiring __init__.py.
addopts =
    -v
    --strict-markers
    --tb=short
    --import-mode=importlib

# Asyncio mode - strict means only activate for @pytest.mark.asyncio tests
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Keep test output clean from known external-library warnings.
filterwarnings =
    ignore:co_lnotab is deprecated, use co_lines instead\.:DeprecationWarning:datasets\.utils\._dill

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_gpu: marks tests that require GPU
    requires_internet: marks tests that require internet connection
    requires_external_data: marks tests that require external data repository
    ssh: marks tests that require SSH connection to RunPod
    gpu: marks tests that require GPU hardware
    requires_ssh_pc: marks tests that require SSH PC connection

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
